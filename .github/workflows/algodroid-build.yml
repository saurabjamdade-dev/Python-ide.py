name: AlgoDroid Pro Android Cloud Build

on:
  workflow_dispatch: # मोबाईल मॅन्युअल ट्रिगर बटण

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # इथे आपण v4 केले आहे, त्यामुळे आता एरर येणार नाही
        with:
          name: AlgoDroid-Pro-Installation-File
          path: build/app/outputs/flutter-apk/app-debug.apk
