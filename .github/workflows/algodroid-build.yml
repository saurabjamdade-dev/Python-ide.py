name: AlgoDroid Pro Android Cloud Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Build Clean Project Structure
        run: |
          rm -rf android build ios windows macos linux web
          flutter create . --org com.algodroid.pro --project-name algodroid_pro --overwrite

      - name: Link Master Code Files
        run: |
          rm -f lib/main.dart
          cp main.dart lib/main.dart
          
          cat << 'EOF' > pubspec.yaml
          name: algodroid_pro
          environment:
            sdk: '>=3.2.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            provider: ^6.1.1
            cupertino_icons: ^1.0.6
          flutter:
            uses-material-design: true
          EOF

      - name: Load Dependencies
        run: flutter pub get

      - name: Compile Master Release APK
        run: flutter build apk --debug --no-pub

      - name: Upload Clean Master APK
        uses: actions/upload-artifact@v4
        with:
          name: AlgoDroid-Pro-Installation-File
          path: build/app/outputs/flutter-apk/app-debug.apk
