name: AlgoDroid Pro Android Cloud Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Recreate Android Project Core Structure
        run: flutter create . --org com.algodroid.pro --project-name algodroid_pro --overwrite

      - name: Restore True AlgoDroid Core UI
        # ही मॅजिकल कमांड काउंटर ॲप हटवून आपला खरा main.dart रिस्टोर करेल
        run: |
          git checkout main.dart
          git checkout pubspec.yaml
          git checkout AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlgoDroid-Pro-Installation-File
          path: build/app/outputs/flutter-apk/app-debug.apk
