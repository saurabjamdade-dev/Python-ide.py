name: AlgoDroid Pro Android Cloud Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Preserve True AlgoDroid Source Files
        # आपल्या खऱ्या फाईल्स तात्पुरत्या सुरक्षित फोल्डरमध्ये हलवून ठेवणे
        run: |
          mkdir -p temp_core
          cp main.dart temp_core/main.dart || true
          cp pubspec.yaml temp_core/pubspec.yaml || true
          cp AndroidManifest.xml temp_core/AndroidManifest.xml || true

      - name: Recreate Android Project Structure
        run: flutter create . --org com.algodroid.pro --project-name algodroid_pro --overwrite

      - name: Force Overwrite Counter App With True AlgoDroid Core
        # डेमो काउंटर ॲप पूर्णपणे डिलीट करून आपला खरा अल्गो डॅशबोर्ड सक्तीने ओव्हरराईट करणे
        run: |
          rm -f lib/main.dart
          cp temp_core/main.dart lib/main.dart
          cp temp_core/pubspec.yaml pubspec.yaml
          rm -f android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main
          cp temp_core/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlgoDroid-Pro-Installation-File
          path: build/app/outputs/flutter-apk/app-debug.apk
